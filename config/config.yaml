# 技术支持知识库机器人配置文件

# 机器人配置
bots:
  # 企业微信
  wecom:
    enabled: true
    webhook_url: "${WECOM_WEBHOOK_URL}"
    # 接收消息配置（用于企微后台回调）
    token: "${WECOM_TOKEN}"
    encoding_aes_key: "${WECOM_ENCODING_AES_KEY}"
    corp_id: "${WECOM_CORP_ID}"
    # 支持的群聊列表
    chat_ids:
      - "技术支持群1"
      - "技术支持群2"

  # Apifox定制版企微机器人 (扣子方案/新API协议)
  apifox_wecom:
    enabled: true
    access_key: "${APIFOX_WECOM_ACCESS_KEY}"
    access_secret: "${APIFOX_WECOM_ACCESS_SECRET}"
    api_base_url: "https://www.yjiyun.com" # 替换为提供API服务的真实网关地址
    webhook_path: "/webhook/apifox_wecom" 

  # 飞书
  feishu:
    enabled: true
    webhook_url: "${FEISHU_WEBHOOK_URL}" # 用于更新通知推送的群自定义机器人Webhook
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    encrypt_key: "${FEISHU_ENCRYPT_KEY}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
    # 进群欢迎语
    welcome_message: "👋 大家好！我是技术支持机器人，@我 或发送关键字即可提问。\n\n输入 /help 查看使用帮助。"
    # 触发关键字（用户消息包含任意关键字时触发响应）
    triggers:
      keywords:
        - "帮助"
        - "问题"
        - "bug"
        - "报错"
    # 支持的群列表
    chat_ids:
      - "oc_xxxxxxxxxxxxxxxx"

# LLM 配置
llm:
  provider: "${LLM_PROVIDER:-anthropic}"  # anthropic/openai/deepseek
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:-}"  # 自定义 API 端点（可选）
  model: "${LLM_MODEL:-glm-5}"
  temperature: 0.3
  max_tokens: 2000
  timeout: 30

# RAG 知识库配置
rag:
  # 文档来源
  document_sources:
    - url: "https://docs.apifox.com/"
      name: "apifox_docs"
      enabled: true

  # 向量数据库
  vector_db:
    provider: "chroma"  # chroma/pinecone/weaviate
    path: "./data/vectordb"
    collection_name: "apifox_knowledge"

  # 检索配置
  retrieval:
    chunk_size: 500
    chunk_overlap: 50
    top_k: 5  # 返回最相关的5个文档片段
    score_threshold: 0.7

# 分类器配置
classifier:
  # 问题类型
  question_types:
    - "bug"        # 缺陷/Bug
    - "feature"    # 需求/功能建议
    - "usage"      # 使用问题/最佳实践

  # 分类阈值
  confidence_threshold: 0.6

  # 分类 Prompt
  prompt_template: |
    你是技术支持专家，需要根据用户反馈判断问题类型。

    ## 用户问题
    {question}

    ## 帮助文档相关内容
    {context}

    ## 补充信息
    {additional_info}

    ## 判断标准
    1. **缺陷 (Bug)**：产品功能与预期设计不符，或出现了错误/报错
       - 例如：功能异常、崩溃、报错、性能问题、兼容性问题

    2. **需求 (Feature)**：产品缺少某个功能，或现有功能无法满足用户的工作流
       - 例如：新功能建议、功能改进、工作流优化

    3. **使用问题 (Usage)**：用户未找到正确的操作方式或最佳实践
       - 例如：不知道如何配置、找不到某个功能

    请严格按照以上标准判断，并返回 JSON 格式：
    {{
      "type": "bug|feature|usage",
      "confidence": 0.0-1.0,
      "reason": "判断理由（引用具体的判断标准）",
      "suggested_answer": "基于文档的建议回答（如果是使用问题）"
    }}

    注意：如果是偶发问题或低概率复现，在 reason 中明确标注。

# 信息收集配置
info_collection:
  # 缺陷信息收集字段（简化版）
  bug_fields:
    - name: "environment_version"
      question: "1. 使用的是Web端还是客户端，版本号多少？"
      required: true
      example: "Web端，版本 2.3.5"

    - name: "steps"
      question: "2. 请描述复现步骤"
      required: true
      example: "1. 打开项目\n2. 点击导入\n3. 选择文件"

    - name: "status_expected"
      question: "3. 请说明现状及预期"
      required: true
      example: "现状：导入失败报错\n预期：导入成功"

  # 需求信息收集字段
  feature_fields:
    - name: "title"
      question: "请简要描述需求建议（20字以内）"
      required: true

    - name: "user_scenario"
      question: "用户在什么情况下、想做什么事情？请描述具体使用场景"
      required: true
      hint: "例如：用户在处理完 A 流程后，希望能一键跳转到 B 流程，以节省时间"

    - name: "current_status"
      question: "用户目前遇到了什么障碍？为什么现有功能无法满足？"
      required: true

    - name: "user_expectation"
      question: "用户希望达成的最终目标是什么？期望的解决方案是什么？"
      required: true

    - name: "user_type"
      question: "用户类型？[个人/企业/私有化用户]"
      required: true

    - name: "subscription_status"
      question: "付费/订阅状态？[免费版/付费版/私有化]"
      required: true

    - name: "team_size"
      question: "团队规模大概多少人？"
      required: false

    - name: "impact_level"
      question: "这个需求对用户工作流的影响程度？(例如：每天节省 5 分钟，团队 50% 接口都有这个问题)"
      required: false

  # 最大提问轮数
  max_rounds: 8

# 飞书工单配置
feishu_ticket:
  base_url: "https://open.feishu.cn"
  app_token: "${FEISHU_APP_TOKEN}"
  # Bug 缺陷表
  bug_table_id: "${FEISHU_BUG_TABLE_ID}"
  # Feature 需求表
  feature_table_id: "${FEISHU_FEATURE_TABLE_ID}"

  # Bug 表字段映射（根据实际表格字段）
  bug_field_mappings:
    title: "标题"
    type: "类型"
    version: "版本"
    environment: "环境"
    steps: "复现步骤"
    expected: "预期结果"
    actual: "实际结果"
    submitter: "提交人"

  # 需求表字段映射（根据实际表格字段）
  feature_field_mappings:
    title: "标题"
    type: "类型"
    submitter: "提交人"

# 飞书关键词表配置
keyword_table:
  base_token: "${FEISHU_KEYWORD_BASE_TOKEN}"
  table_id: "${FEISHU_KEYWORD_TABLE_ID}"

  # 自动生成关键词配置
  generator:
    enabled: true
    history_days: 7  # 分析过去多少天的工单记录
    min_cluster_size: 2  # 最少几次相同问题才生成关键词
    ticket_table_ids:
      - "${FEISHU_BUG_TABLE_ID}"
      - "${FEISHU_FEATURE_TABLE_ID}"

  # 通知配置
  notification:
    enabled: true
    # @的负责人
    mention_users:
      - "ou_xxxxxxxxxxxxxxxx"  # 你的飞书用户ID
    # 通知消息模板
    message_template: |
      新的{type}提交：{title}
      提交人：{submitter}
      优先级：{priority}
      详情请查看多维表格

# 模板配置
templates:
  bug_template: |
    ## Bug 报告

    **标题**：{title}

    **版本**：{version}
    **环境**：{environment}

    **问题描述**：
    {description}

    **复现步骤**：
    {steps}

    **预期结果**：
    {expected}

    **实际结果**：
    {actual}

    **附加信息**：
    {additional_info}

  feature_template: |
    ## 功能需求

    **标题**：{title}

    **需求背景**：
    {background}

    **预期场景**：
    {scenario}

    **期望行为**：
    {expected}

    **价值说明**：
    {value}

    **附加信息**：
    {additional_info}

  usage_template: |
    ## 使用咨询

    **问题**：{question}

    **解答**：
    {answer}

    **相关文档**：
    {related_docs}

# 日志配置
logging:
  level: "INFO"  # DEBUG/INFO/WARNING/ERROR
  file: "./logs/bot.log"
  rotation: "10 MB"
  retention: "30 days"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  debug: false

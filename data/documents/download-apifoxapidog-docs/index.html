<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 文档浏览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 60px;
      max-width: 800px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #333;
      font-size: 2.5em;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #666;
      font-size: 1.2em;
      margin-bottom: 40px;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    .link-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .link-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .link-card .icon {
      font-size: 3em;
    }
    .link-card .title {
      font-size: 1.3em;
      font-weight: bold;
    }
    .link-card .desc {
      font-size: 0.9em;
      opacity: 0.9;
    }
    .info {
      margin-top: 40px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 API 文档浏览器</h1>
    <p class="subtitle">浏览本地下载的 API 文档</p>
    
    <div class="links">
      <a href="/help-docs/apifox" class="link-card">
        <div class="icon">🦊</div>
        <div class="title">Apifox 文档</div>
        <div class="desc">查看 Apifox 帮助文档</div>
      </a>
      
      <a href="/help-docs/apidog" class="link-card">
        <div class="icon">🐕</div>
        <div class="title">Apidog 文档</div>
        <div class="desc">查看 Apidog 帮助文档</div>
      </a>
    </div>
    
    <div class="info">
      <p>💡 提示：点击上方卡片或直接访问 <code>/help-docs/</code> 目录浏览所有文档</p>
    </div>
  </div>
</body>
</html>
